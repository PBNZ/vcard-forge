# VCF Pro — CI/CD Pipeline
#
# Runs on push/PR: full test suite + JS syntax + HTML structure validation,
# then GitHub Pages deployment on main.

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/deploy.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run test suite
        run: node tests/run-tests.js

      - name: Validate JavaScript syntax
        run: |
          echo "Checking JS files for syntax errors..."
          for file in src/js/*.js; do
            echo "  Checking $file"
            node --check "$file"
          done
          echo "All JS files passed syntax check."

      - name: Validate HTML structure
        run: |
          echo "Checking HTML files..."
          # Basic validation: ensure DOCTYPE, html, head, body tags exist
          for file in src/*.html; do
            echo "  Checking $file"
            if ! grep -qi '<!DOCTYPE html>' "$file"; then
              echo "ERROR: $file missing DOCTYPE"
              exit 1
            fi
            if ! grep -qi '<html' "$file"; then
              echo "ERROR: $file missing <html> tag"
              exit 1
            fi
            if ! grep -qi '</html>' "$file"; then
              echo "ERROR: $file missing closing </html> tag"
              exit 1
            fi
          done
          echo "All HTML files passed validation."

  # ============================================================
  # DEPLOYMENT
  # ============================================================

  # --- GitHub Pages ---
  deploy-pages:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Inject Google Analytics
        env:
          GA_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          python3 - << 'EOF'
          import os, re, sys

          ga_id = os.environ.get('GA_ID', '').strip()
          placeholder = '<!-- GOOGLE_ANALYTICS_PLACEHOLDER -->'

          with open('src/index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          if re.match(r'^G-[A-Z0-9]+$', ga_id):
              count = html.count(placeholder)
              if count != 1:
                  print(f'ERROR: Expected exactly 1 placeholder, found {count}. Cannot inject Google Analytics.')
                  sys.exit(1)
              snippet = (
                  '<!-- Google tag (gtag.js) -->\n'
                  '    <script async src="https://www.googletagmanager.com/gtag/js?id=' + ga_id + '"></script>\n'
                  '    <script>\n'
                  '      window.dataLayer = window.dataLayer || [];\n'
                  '      function gtag(){dataLayer.push(arguments);}\n'
                  '      gtag("js", new Date());\n'
                  '      gtag("config", "' + ga_id + '");\n'
                  '    </script>'
              )
              html = html.replace(placeholder, snippet)
              print('Google Analytics injected:', ga_id)
          else:
              html = re.sub(r'^[ \t]*' + re.escape(placeholder) + r'[ \t]*\r?\n?', '', html, flags=re.MULTILINE)
              if ga_id:
                  print('WARNING: GA_MEASUREMENT_ID "' + ga_id + '" is not a valid GA4 ID (expected format: G- followed by uppercase letters/digits, e.g. G-HHYVHP2GN1). Skipping.')
              else:
                  print('GA_MEASUREMENT_ID not set — skipping analytics injection.')

          with open('src/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

